aid: bill
name: BILL
description: >-
  BILL (formerly Bill.com) is a cloud-based financial operations platform for
  small and midsize businesses that automates accounts payable, accounts
  receivable, and spend & expense management. The BILL API Platform exposes
  these workflows through the BILL v3 REST API and embeddable BILL Elements
  UI components, enabling partners and ERPs to integrate bill capture,
  approvals, payments, and real-time event notifications via webhooks. The
  API uses session-based authentication with API keys and developer keys
  against production and sandbox gateways.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
