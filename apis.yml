      - type: AsyncAPI
        url: https://raw.githubusercontent.com/api-evangelist/bill/refs/heads/main/asyncapi/bill-webhooks-asyncapi.yml
  - aid: bill:elements
    name: BILL Elements
    description: >-
      Low-code, embeddable UI components that surface the BILL Accounts
      Payable workflow inside partner applications with minimal
      development effort.
    humanURL: https://developer.bill.com/docs/home
