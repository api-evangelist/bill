apis:
  - aid: bill:v3-api
    name: BILL v3 API
    description: >-
      REST API providing full-breadth access to BILL's Accounts Payable,
      Accounts Receivable, and Spend & Expense capabilities including
      bills, invoices, vendors, customers, payments, approvals, and
      webhook event notifications. Production calls are made to
      https://gateway.prod.bill.com/connect/v3 with sandbox at
      https://gateway.stage.bill.com/connect/v3.
    humanURL: https://developer.bill.com/docs/bill-v3-api-get-started
    baseURL: https://gateway.prod.bill.com/connect/v3
    tags:
      - Accounts Payable
      - Accounts Receivable
      - Spend Management
      - Payments
      - Webhooks
    properties:
      - type: Documentation
        url: https://developer.bill.com/docs/home
      - type: APIReference
